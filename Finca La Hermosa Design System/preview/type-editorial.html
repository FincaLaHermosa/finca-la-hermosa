<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background: #fffdf8; padding: 28px 36px; }
.label { font-family: 'Poppins', sans-serif; font-size:10px; font-weight:500; letter-spacing:0.1em; text-transform:uppercase; color: #8c7d68; margin-bottom:18px; }
.main  { font-family: 'Cormorant Garamond', serif; font-size: 52px; font-weight:300; line-height:1.15; color: #2d4949; letter-spacing:-0.01em; }
.main-italic { font-family: 'Cormorant Garamond', serif; font-size: 52px; font-weight:300; font-style:italic; line-height:1.15; color: #2d4949; }
.divider { width:32px; height:1px; background:#c07a5a; margin:18px 0; }
.small  { font-family: 'Cormorant Garamond', serif; font-size:22px; font-weight:400; color:#2d4949; margin-bottom:4px; }
.small-italic { font-family: 'Cormorant Garamond', serif; font-size:20px; font-weight:300; font-style:italic; color: #c07a5a; }
</style>
</head>
<body>
  <div class="label">Cormorant Garamond — Editorial / Subtítulos</div>
  <div class="main">No vendemos eventos.</div>
  <div class="main-italic">Creamos recuerdos.</div>
  <div class="divider"></div>
  <div class="small">Boda Jardín</div>
  <div class="small-italic">La celebración que siempre imaginaste</div>
</body>
</html>
