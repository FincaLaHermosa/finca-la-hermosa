<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background: var(--color-crema-calida); padding: 24px 28px; display:flex; gap:24px; align-items:center; }
.card { width:140px; height:80px; background: var(--color-crema-clara); border-radius: var(--radius-md); display:flex; align-items:center; justify-content:center; }
.lbl  { font-family: var(--font-body); font-size:10px; font-weight:400; color: var(--fg-muted); text-align:center; margin-top:6px; }
.item { display:flex; flex-direction:column; align-items:center; }
</style>
</head>
<body>
  <div class="item">
    <div class="card" style="box-shadow: var(--shadow-sm)"></div>
    <div class="lbl">--shadow-sm</div>
  </div>
  <div class="item">
    <div class="card" style="box-shadow: var(--shadow-md)"></div>
    <div class="lbl">--shadow-md</div>
  </div>
  <div class="item">
    <div class="card" style="box-shadow: var(--shadow-lg)"></div>
    <div class="lbl">--shadow-lg</div>
  </div>
  <div class="item">
    <div class="card" style="box-shadow: var(--shadow-card)"></div>
    <div class="lbl">--shadow-card</div>
  </div>
</body>
</html>
