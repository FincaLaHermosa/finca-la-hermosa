<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background: var(--color-crema-clara); padding: 20px; font-family: var(--font-body); }
.row { display:flex; gap: 10px; }
.swatch { flex:1; height:80px; border-radius: var(--radius-md); display:flex; flex-direction:column; justify-content:flex-end; padding: 8px 10px; }
.swatch span { font-size:11px; font-weight:500; letter-spacing:0.04em; }
.name { color: rgba(255,255,255,0.9); }
.hex  { color: rgba(255,255,255,0.65); font-size:10px; }
.name-dark { color: var(--color-carbon); }
.hex-dark  { color: var(--color-texto-suave); font-size:10px; }
</style>
</head>
<body>
<div class="row">
  <div class="swatch" style="background:var(--color-terracota)">
    <span class="name">Terracota</span><span class="hex">#c07a5a</span>
  </div>
  <div class="swatch" style="background:var(--color-verde-finca)">
    <span class="name">Verde Finca</span><span class="hex">#2d4949</span>
  </div>
  <div class="swatch" style="background:var(--color-verde-dark)">
    <span class="name">Verde Oscuro</span><span class="hex">#1e3232 · texto</span>
  </div>
  <div class="swatch" style="background:var(--color-verde-light)">
    <span class="name">Verde Medio</span><span class="hex">#4a6e6e</span>
  </div>
</div>
</body>
</html>
