<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background: var(--color-crema-clara); padding: 28px 32px; display:flex; flex-direction:column; gap:24px; }

.glass-demo {
  background-image: url(https://images.unsplash.com/photo-1416879595882-3373a0480b5b?w=800&q=80);
  background-size: cover; background-position: center;
  border-radius: 8px; padding: 28px 32px;
  display: flex; gap: 20px; align-items: center; flex-wrap: wrap;
}

/* Shared hover scale */
button { transition: transform 0.22s ease, background 0.22s ease, color 0.22s ease, border-color 0.22s ease, box-shadow 0.22s ease; }
button:hover { transform: scale(1.05); }

/* Labels */
.btn-group { display:flex; gap:20px; align-items:flex-end; flex-wrap:wrap; }
.btn-item  { display:flex; flex-direction:column; align-items:center; gap:8px; }
.btn-name  { font-family:'Jost',sans-serif; font-size:10px; font-weight:400; letter-spacing:0.08em; text-transform:uppercase; color:var(--color-texto-suave); }

@import url('https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&display=swap');

/* Primary — héroe, sección oscura, CTA principal */
.btn-primary {
  font-family: var(--font-body); font-size: 12px; font-weight: 500;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--color-crema-clara); background: var(--color-verde-finca);
  border: none; padding: 14px 28px; border-radius: var(--radius-pill); cursor: pointer;
}
.btn-primary:hover { background: var(--color-verde-light); }

/* Secondary — acciones secundarias sobre fondo claro */
.btn-secondary {
  font-family: var(--font-body); font-size: 12px; font-weight: 500;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--color-verde-finca); background: transparent;
  border: 1.5px solid var(--color-verde-finca);
  padding: 13px 28px; border-radius: var(--radius-pill); cursor: pointer;
}
.btn-secondary:hover { background: var(--color-verde-finca); color: var(--color-crema-clara); }

/* Accent — CTAs de alta prioridad, terracota */
.btn-accent {
  font-family: var(--font-body); font-size: 12px; font-weight: 500;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--color-crema-clara); background: var(--color-terracota);
  border: none; padding: 14px 28px; border-radius: var(--radius-pill); cursor: pointer;
}
.btn-accent:hover { background: #a8664a; }

/* Ghost — sobre fondo oscuro o verde, con borde terracota */
.btn-ghost {
  font-family: var(--font-body); font-size: 12px; font-weight: 500;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--color-terracota); background: transparent;
  border: 1.5px solid var(--color-terracota);
  padding: 13px 28px; border-radius: var(--radius-pill); cursor: pointer;
}
.btn-ghost:hover { background: var(--color-terracota); color: var(--color-crema-clara); }

/* Link — acciones inline, leer más, ver detalles */
.btn-link {
  font-family: var(--font-body); font-size: 14px; font-weight: 400;
  color: var(--color-terracota); background: none; border: none; padding: 0;
  border-bottom: 1px solid var(--color-terracota-light);
  cursor: pointer; letter-spacing: 0.02em; display:inline-block;
}
.btn-link:hover { border-bottom-color: var(--color-terracota); }

/* Liquid Glass — héroe sobre foto, secciones con imagen de fondo */
.btn-glass {
  font-family: var(--font-body); font-size: 12px; font-weight: 400;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: rgba(255,253,248,0.92);
  background: rgba(30,30,24,0.38);
  backdrop-filter: blur(18px) saturate(1.4);
  -webkit-backdrop-filter: blur(18px) saturate(1.4);
  border: 1px solid rgba(255,255,255,0.18);
  padding: 16px 36px; border-radius: var(--radius-pill); cursor: pointer;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.12), 0 4px 24px rgba(0,0,0,0.18);
}
.btn-glass:hover { background: rgba(30,30,24,0.52); border-color: rgba(255,255,255,0.28); }
</style>
</head>
<body>

  <div class="btn-group">
    <div class="btn-item">
      <button class="btn-primary">Reservar visita</button>
      <span class="btn-name">Primary · CTA principal</span>
    </div>
    <div class="btn-item">
      <button class="btn-secondary">Ver más</button>
      <span class="btn-name">Secondary · Acción alterna</span>
    </div>
    <div class="btn-item">
      <button class="btn-accent">Contáctanos</button>
      <span class="btn-name">Accent · Énfasis terracota</span>
    </div>
    <div class="btn-item">
      <button class="btn-ghost">Conocer finca</button>
      <span class="btn-name">Ghost · Sobre fondo oscuro</span>
    </div>
    <div class="btn-item" style="margin-top:8px">
      <button class="btn-link">Leer más →</button>
      <span class="btn-name">Link · Acción inline</span>
    </div>
  </div>

  <div class="glass-demo">
    <div class="btn-item">
      <button class="btn-glass">Explorar espacios</button>
      <span class="btn-name" style="color:rgba(255,253,248,0.55)">Liquid Glass · Sobre foto</span>
    </div>
    <div class="btn-item">
      <button class="btn-glass">Agendar visita</button>
      <span class="btn-name" style="color:rgba(255,253,248,0.55)">Liquid Glass · Sobre foto</span>
    </div>
  </div>

</body>
</html>
