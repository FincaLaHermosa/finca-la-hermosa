<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background: var(--color-crema-calida); padding: 24px 28px; display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
.badge {
  font-family: var(--font-body);
  font-size: 11px; font-weight: 500;
  letter-spacing: 0.08em; text-transform: uppercase;
  padding: 5px 12px; border-radius: var(--radius-pill);
  display: inline-block; position: relative; overflow: hidden;
}
.badge::after {
  content: '';
  position: absolute; top: 0; left: -120%;
  width: 55%; height: 100%;
  background: linear-gradient(105deg, transparent 20%, rgba(255,255,255,0.42) 50%, transparent 80%);
  transform: skewX(-15deg);
  animation: shimmer 3s ease-in-out infinite;
}
@keyframes shimmer {
  0%   { left: -120%; }
  28%  { left: 160%; }
  100% { left: 160%; }
}
.badge:nth-child(1)::after { animation-delay: 0s; }
.badge:nth-child(2)::after { animation-delay: 0s; }
.badge:nth-child(3)::after { animation-delay: 0s; }
.badge:nth-child(4)::after { animation-delay: 0s; }
.badge:nth-child(5)::after { animation-delay: 0s; }

.b1 { background: var(--color-terracota); color: var(--color-crema-clara); }
.b3 { background: var(--color-verde-finca); color: var(--color-crema-clara); }
.b4 { background: transparent; border: 1px solid var(--color-verde-finca); color: var(--color-verde-finca); }
.b5 { background: var(--color-crema-media); color: var(--color-texto-cuerpo); }
.b6 { background: var(--color-carbon); color: var(--color-crema-clara); }
</style>
</head>
<body>
  <span class="badge b1">Nuevo</span>
  <span class="badge b3">Disponible</span>
  <span class="badge b4">Reserva</span>
  <span class="badge b5">Próximamente</span>
  <span class="badge b6">Estd. 1999</span>
</body>
</html>
