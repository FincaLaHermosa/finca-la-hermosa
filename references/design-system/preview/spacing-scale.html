<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background: var(--color-crema-calida); padding: 24px 28px; display:flex; gap:32px; align-items:flex-end; }
.item { display:flex; flex-direction:column; align-items:center; gap:6px; }
.bar  { background: var(--color-verde-finca); border-radius: 3px; width: 32px; }
.lbl  { font-family: var(--font-body); font-size:10px; font-weight:400; color: var(--fg-muted); text-align:center; }
.val  { font-family: var(--font-body); font-size:11px; font-weight:500; color: var(--fg-body); }
</style>
</head>
<body>
  <div class="item"><div class="bar" style="height:4px"></div><div class="lbl">--space-1</div><div class="val">4px</div></div>
  <div class="item"><div class="bar" style="height:8px"></div><div class="lbl">--space-2</div><div class="val">8px</div></div>
  <div class="item"><div class="bar" style="height:12px"></div><div class="lbl">--space-3</div><div class="val">12px</div></div>
  <div class="item"><div class="bar" style="height:16px"></div><div class="lbl">--space-4</div><div class="val">16px</div></div>
  <div class="item"><div class="bar" style="height:24px"></div><div class="lbl">--space-5</div><div class="val">24px</div></div>
  <div class="item"><div class="bar" style="height:32px"></div><div class="lbl">--space-6</div><div class="val">32px</div></div>
  <div class="item"><div class="bar" style="height:48px"></div><div class="lbl">--space-7</div><div class="val">48px</div></div>
  <div class="item"><div class="bar" style="height:64px"></div><div class="lbl">--space-8</div><div class="val">64px</div></div>
  <div class="item"><div class="bar" style="height:96px"></div><div class="lbl">--space-9</div><div class="val">96px</div></div>
</body>
</html>
