<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background: var(--color-crema-clara); padding: 24px 28px; }
.label { font-family: var(--font-body); font-size:10px; font-weight:500; letter-spacing:0.1em; text-transform:uppercase; color: var(--fg-muted); margin-bottom:4px; }
.hero  { font-family: var(--font-display); font-size: 72px; line-height:1; color: var(--color-verde-finca); letter-spacing:-0.02em; }
.sub   { font-family: var(--font-display); font-size: 42px; line-height:1.1; color: var(--color-terracota); letter-spacing:-0.01em; margin-top: 8px; }
</style>
</head>
<body>
  <div class="label">Against — Display / Decorativa</div>
  <div class="hero">Finca La Hermosa</div>
  <div class="sub">estd. 1999</div>
</body>
</html>
