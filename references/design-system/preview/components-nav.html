<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#111; font-family:'Jost',sans-serif; display:flex; flex-direction:column; gap:0; }

.scene {
  position:relative; width:100%;
  background-image: url(../assets/hero-wedding.jpg);
  background-size:cover; background-position:center 30%;
}
.scene::before { content:''; position:absolute; inset:0; background:rgba(18,28,24,0.38); }

.nav {
  position:relative; z-index:10;
  width:calc(100% - 48px); height:60px;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 32px; margin:16px 24px 0; border-radius:999px;
}

.nav-transparent {
  background:rgba(18,28,24,0.18);
  border:1px solid rgba(255,255,255,0.12);
  box-shadow:0 8px 32px rgba(0,0,0,0.22), inset 0 1px 0 rgba(255,255,255,0.08);
  backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
}

.nav-glass {
  background:rgba(30,50,48,0.72);
  backdrop-filter:blur(24px) saturate(1.5); -webkit-backdrop-filter:blur(24px) saturate(1.5);
  border:1px solid rgba(255,255,255,0.12);
  box-shadow:0 8px 40px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.09);
}

.nav-logo img { height:38px; width:auto; display:block; }

.nav-links { display:flex; align-items:center; gap:28px; }
.nav-links a {
  font-family:'Jost',sans-serif; font-size:11px; font-weight:400;
  letter-spacing:0.12em; text-transform:uppercase;
  color:rgba(255,253,248,0.72); text-decoration:none;
  padding-bottom:2px; border-bottom:1px solid transparent;
  transition:all 0.2s ease;
}
.nav-links a:hover { color:#fffdf8; }
.nav-links a.active { color:#fffdf8; border-bottom-color:rgba(255,253,248,0.5); }

.nav-right { display:flex; align-items:center; gap:20px; }

.nav-wa {
  background:none; border:none; cursor:pointer; padding:0;
  display:flex; align-items:center; transition:opacity 0.2s;
}
.nav-wa:hover { opacity:1; }
.nav-wa svg { opacity:0.7; transition:opacity 0.2s; }
.nav-wa:hover svg { opacity:1; }

.nav-cta {
  font-family:'Jost',sans-serif; font-size:10px; font-weight:500;
  letter-spacing:0.13em; text-transform:uppercase; color:#fffdf8;
  background:rgba(255,253,248,0.08); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.22);
  padding:9px 20px; border-radius:999px; cursor:pointer;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.1);
  transition:all 0.22s ease; white-space:nowrap;
}
.nav-cta:hover { background:rgba(192,122,90,0.85); border-color:rgba(192,122,90,0.6); transform:scale(1.04); }

.spacer { height:100px; }
.nav-label {
  font-family:'Jost',sans-serif; font-size:10px; font-weight:400;
  letter-spacing:0.1em; text-transform:uppercase;
  color:rgba(255,253,248,0.35); text-align:center;
  padding:12px 40px 16px; position:relative; z-index:10;
}

.wa-icon { fill:#fffdf8; }
</style>
</head>
<body>

  <!-- VARIANT 1: Transparente -->
  <div class="scene">
    <nav class="nav nav-transparent">
      <div class="nav-logo">
        <img src="../assets/logo-blanco.svg?v=3" alt="La Hermosa">
      </div>
      <div class="nav-links">
        <a href="#" class="active">Inicio</a>
        <a href="#">Espacios</a>
        <a href="#">Experiencias</a>
        <a href="#">Nosotros</a>
        <a href="#">FAQ</a>
      </div>

        <button class="nav-wa" title="WhatsApp">

        </button>
        <button class="nav-cta">Agendar visita</button>
      </div>
    </nav>
    <div class="spacer"></div>
    <div class="nav-label">Variante 1 · Transparente — estado inicial</div>
  </div>

  <!-- VARIANT 2: Liquid glass -->
  <div class="scene">
    <nav class="nav nav-glass">
      <div class="nav-logo">
        <img src="../assets/logo-blanco.svg?v=3" alt="La Hermosa">
      </div>
      <div class="nav-links">
        <a href="#">Inicio</a>
        <a href="#">Espacios</a>
        <a href="#" class="active">Experiencias</a>
        <a href="#">Nosotros</a>
        <a href="#">FAQ</a>
      </div>
      <div class="nav-right">
        <button class="nav-wa" title="WhatsApp">

        </button>
        <button class="nav-cta">Agendar visita</button>
      </div>
    </nav>
    <div class="spacer"></div>
    <div class="nav-label">Variante 2 · Liquid glass — al hacer scroll</div>
  </div>

</body>
</html>
