<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background: #e8e0d4; padding: 20px; font-family: var(--font-body); }
.row { display:flex; gap: 10px; }
.swatch { flex:1; height:80px; border-radius: var(--radius-md); display:flex; flex-direction:column; justify-content:flex-end; padding: 8px 10px; border: 1px solid var(--color-crema-media); }
.name { font-size:11px; font-weight:500; color: var(--color-texto-cuerpo); }
.hex  { font-size:10px; color: var(--color-texto-suave); }
</style>
</head>
<body>
<div class="row">
  <div class="swatch" style="background:var(--color-crema-clara)">
    <span class="name">Crema Clara</span><span class="hex">#fffdf8</span>
  </div>
  <div class="swatch" style="background:var(--color-crema-calida)">
    <span class="name">Crema Cálida</span><span class="hex">#f5f0e8</span>
  </div>
  <div class="swatch" style="background:var(--color-crema-media)">
    <span class="name">Crema Media</span><span class="hex">#ede6d6</span>
  </div>
  <div class="swatch" style="background:var(--color-texto-cuerpo)">
    <span class="name" style="color:#f5f0e8">Texto Cuerpo</span><span class="hex" style="color:#c9b99a">#5a5040</span>
  </div>
  <div class="swatch" style="background:var(--color-texto-suave)">
    <span class="name" style="color:#f5f0e8">Texto Suave</span><span class="hex" style="color:#c9b99a">#8c7d68</span>
  </div>
  <div class="swatch" style="background:var(--color-terracota-light)">
    <span class="name">Terracota Claro</span><span class="hex">#e8c4ad</span>
  </div>
</div>
</body>
</html>
